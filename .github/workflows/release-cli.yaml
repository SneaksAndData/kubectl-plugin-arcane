name: Release binary to GitHub Releases
run-name: Publish binary from ${{github.ref_name}} by @${{ github.actor }}

on:
  workflow_dispatch

permissions:
  contents: write

jobs:
  release_binary:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Setup Go
        uses: actions/setup-go@v6
        with:
          go-version: '1.25.*'

      - name: Get build number
        shell: bash
        id: buildnumber
        run: |
          dt=$(date +'%Y%m%d%H%M%S')
          echo "result=$dt" >> "$GITHUB_OUTPUT"

      - name: Run GoReleaser
        uses: goreleaser/goreleaser-action@v7
        id: goreleaser
        with:
          distribution: goreleaser
          version: '~> v2'
          args: release --clean
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          BUILD_NUMBER: ${{ steps.buildnumber.outputs.result }}
